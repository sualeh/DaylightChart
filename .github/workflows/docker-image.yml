name: Build and Publish Daylight Chart Docker Image

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_IMAGE_NAME: sualehfatehi/daylight-chart
  DOCKER_IMAGE_TAG: latest
  DOCKERFILE_PATH: ./Dockerfile
  DOCKER_CONTEXT_PATH: .

jobs:
  build:
    name: Build and Publish Daylight Chart Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:

# VALIDATE TAGS
    - id: validate-semver
      name: Validate tag against semantic versioning
      if: startsWith(github.ref, 'refs/tags/')
      shell: bash
      run: |
        SEMVER_PATTERN="^refs/tags/v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$"
        if [[ ! $GITHUB_REF =~ $SEMVER_PATTERN ]]
          then
            echo "Tag $GITHUB_REF does not follow semantic versioning"
            exit 1
          fi

# SETUP BUILD ENVIRONMENT
    - id: checkout
      name: Check out repository
      uses: actions/checkout@v7

# BUILD AND PUBLISH DOCKER IMAGE
    - id: setup-qemu
      name: Setup QEMU
      uses: docker/setup-qemu-action@v4

    - id: setup-buildx
      name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v4

    - id: docker-login
      name: Log into Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - id: validate-build-configuration
      name: Validate build configuration
      uses: docker/build-push-action@v7
      with:
        call: check
        file: ${{ env.DOCKERFILE_PATH }}
        context: ${{ env.DOCKER_CONTEXT_PATH }}
        load: false
        push: false

    - id: meta
      name: Set up Docker metadata
      uses: docker/metadata-action@v6
      with:
        images: |
          ${{ env.DOCKER_IMAGE_NAME }}
        tags: |
          type=raw,value=${{ env.DOCKER_IMAGE_TAG }},priority=1200
          type=semver,pattern=v{{version}},priority=940
          type=semver,pattern={{version}},priority=930
          type=semver,pattern={{major}}.{{minor}},priority=920
          type=semver,pattern={{major}},priority=910
        labels: |
          maintainer=Sualeh Fatehi <sualeh@hotmail.com>
          org.opencontainers.image.authors=Sualeh Fatehi <sualeh@hotmail.com>
          org.opencontainers.image.vendor=Sualeh Fatehi
          org.opencontainers.image.licenses=(EPL-2.0)
          org.opencontainers.image.url=https://github.com/sualeh/daylight-chart

    - id: build-docker-image
      name: Build Docker image locally
      uses: docker/build-push-action@v7
      with:
        call: build
        file: ${{ env.DOCKERFILE_PATH }}
        context: ${{ env.DOCKER_CONTEXT_PATH }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        # Build just for runner platform
        platforms: linux/amd64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        annotations: ${{ steps.meta.outputs.annotations }}
        load: true
        push: false

    - id: push-docker-image
      name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        call: build
        file: ${{ env.DOCKERFILE_PATH }}
        context: .
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: |-
          linux/amd64
          linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        annotations: ${{ steps.meta.outputs.annotations }}
        sbom: true
        provenance: true
        load: false
        push: true
